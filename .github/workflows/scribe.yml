name: Update README

on:
  push:
  schedule:
    - cron: "0 */1 * * *"

jobs:
  markscribe:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@master

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      # Build markscribe from fork with a fix for GitHub GraphQL resource
      # limits until https://github.com/muesli/markscribe/pull/103 is merged
      # and the readme-scribe docker image is rebuilt.
      - run: |
          git clone --depth 1 --branch fix-graphql-resource-limits https://github.com/danielgatis/markscribe /tmp/markscribe
          go build -C /tmp/markscribe -o /tmp/markscribe/markscribe .

      - run: /tmp/markscribe/markscribe -write README.md templates/README.md.tpl
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}

      - uses: stefanzweifel/git-auto-commit-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit_message: Update generated README
          branch: main
          commit_user_name: readme-scribe 🤖
          commit_user_email: actions@github.com
          commit_author: readme-scribe 🤖 <actions@github.com>
